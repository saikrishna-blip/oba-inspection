<script>
// ============================================================
// STATE
// ============================================================
let API_URL = localStorage.getItem('oba_api_url') || '';
let currentUser = null; // {username, role, name}
let allKits = [];
let lotState = null;      // active inspection lot
let sampleRows = [];      // 13 sample row objects
let notification = null;
let notifTimer = null;

const MODEL_CODES = { 'LH1G':'1217', 'LH3G':'1218' };

// ============================================================
// UTILITY
// ============================================================
function mmyy(str){ // "2026-06" -> "0626"
  if(!str) return '';
  const [y,m] = str.split('-');
  return m + y.slice(2);
}
function mmyyDisplay(code){ // "0626" -> "06/2026"
  if(!code||code.length!==4) return '-';
  return code.slice(0,2)+'/20'+code.slice(2);
}
function mmyyToInput(code){ // "0626" -> "2026-06"
  if(!code||code.length!==4) return '';
  return '20'+code.slice(2)+'-'+code.slice(0,2);
}

function toast(msg, type='success'){
  clearTimeout(notifTimer);
  notification = {msg, type};
  render();
  notifTimer = setTimeout(()=>{ notification=null; render(); }, 3500);
}

async function api(action, payload){
  payload = payload||{};
  payload.action = action;
  const r = await fetch(API_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify(payload)
  });
  return r.json();
}

// ============================================================
// BLACK DOT EVALUATOR (exact logic from IS 2500)
// ============================================================
function evaluateBlackDot({visibleAt2m, D, N, DS, area}){
  if(!visibleAt2m) return {ok:true, reason:'Not visible from 2m — Acceptable regardless of quantity.'};
  D = parseFloat(D)||0; N = parseInt(N)||0; DS = parseFloat(DS)||0;
  if(D > 2.4) return {ok:false, reason:`D=${D}mm > 2.4mm — FAIL (Major)`};
  if(D <= 1.28){
    if(N<=3 && DS>=15) return {ok:true, reason:`D=${D}mm ≤ 1.28mm, N=${N}, DS=${DS}mm — OK (no area distinction needed)`};
    return {ok:false, reason:`D=${D}mm ≤ 1.28mm but N=${N}>3 or DS=${DS}<15mm — FAIL`};
  }
  // 1.28 < D <= 2.4
  if(N>3) return {ok:false, reason:`D=${D}mm, N=${N}>3 — FAIL`};
  if(DS<15) return {ok:false, reason:`D=${D}mm, DS=${DS}mm<15mm — FAIL`};
  if(area==='A'){ if(N<=1) return {ok:true, reason:`D=${D}mm in Area A, N=${N}≤1 — OK`}; return {ok:false, reason:`Area A: N=${N}>1 — FAIL`}; }
  if(area==='B'){ if(N<=3) return {ok:true, reason:`D=${D}mm in Area B, N=${N}≤3 — OK`}; return {ok:false, reason:`Area B: N=${N}>3 — FAIL`}; }
  if(area==='A+B'){ if(N<=3) return {ok:true, reason:`D=${D}mm in Area A+B, N=${N}≤3 — OK`}; return {ok:false, reason:`Area A+B: N=${N}>3 — FAIL`}; }
  return {ok:false, reason:'Unknown area'};
}

// ============================================================
// SERIAL VALIDATION
// ============================================================
function validateSerial(serial, model, prodMonthCode, existingInBatch){
  if(!serial||serial.trim().length!==15) return 'Must be exactly 15 digits';
  const s = serial.trim().toUpperCase();
  const expModel = MODEL_CODES[model]||'';
  if(s.substring(0,4)!==expModel) return `Model code mismatch — expected ${expModel} for ${model}`;
  if(s.substring(4,8)!==prodMonthCode) return `Month code mismatch — expected ${prodMonthCode} (${mmyyDisplay(prodMonthCode)})`;
  const mm = parseInt(s.substring(4,6));
  if(isNaN(mm)||mm<1||mm>12) return 'Invalid month digits (01-12)';
  if(!/^\d{7}$/.test(s.substring(8))) return 'Last 7 characters must be numeric';
  if(existingInBatch && existingInBatch.includes(s)) return 'Duplicate within current batch';
  return ''; // valid
}

// ============================================================
// LOT TALLY
// ============================================================
function tallyLot(){
  let minors=0, majors=0;
  sampleRows.forEach(s=>{
    if(!s.aestheticPass) minors++;
    if(!s.generalPass||!s.functionalPass||!s.screenPass) majors++;
    if(!s.noBlackDot){
      const bd = evaluateBlackDot({visibleAt2m:s.bdVisible, D:s.bdD, N:s.bdN, DS:s.bdDS, area:s.bdArea});
      if(!bd.ok) majors++;
    }
  });
  return {minors, majors, passed: minors<=1 && majors===0};
}

function sampleResult(s){
  let isMajor = !s.generalPass||!s.functionalPass||!s.screenPass;
  if(!s.noBlackDot){
    const bd = evaluateBlackDot({visibleAt2m:s.bdVisible,D:s.bdD,N:s.bdN,DS:s.bdDS,area:s.bdArea});
    if(!bd.ok) isMajor=true;
  }
  const isMinor = !s.aestheticPass;
  if(isMajor) return 'FAIL-MAJOR';
  if(isMinor) return 'FAIL-MINOR';
  return 'PASS';
}

// ============================================================
// GROUP KITS
// ============================================================
function groupKits(kits){
  const map={}, order=[];
  kits.forEach(k=>{
    if(!map[k.kitName]){map[k.kitName]=[]; order.push(k.kitName);}
    map[k.kitName].push(k);
  });
  return order.map(name=>{
    const lots = map[name];
    const totalLots = Number(lots[0].totalLots)||lots.length;
    const kitQty = Number(lots[0].kitTotalQty)||0;
    const completed = lots.filter(l=>l.status==='Closed').length;
    const pending = lots.filter(l=>l.status==='Open').length;
    const passLots = lots.filter(l=>l.result==='PASS').length;
    const failLots = lots.filter(l=>l.result==='FAIL').length;
    const fgPass = lots.reduce((s,l)=>s+(Number(l.fgPassQty)||0),0);
    return {name, lots, totalLots, kitQty, completed, pending, passLots, failLots, fgPass,
            model:lots[0].model, prodMonthCode:lots[0].prodMonthCode};
  });
}

// ============================================================
// FRESH SAMPLE TEMPLATES
// ============================================================
function freshSamples(n){
  return Array.from({length:n},(_,i)=>({
    sampleNum:i+1, serial:'', serialError:'',
    aestheticPass:true, generalPass:true, functionalPass:true, screenPass:true,
    noBlackDot:true, bdVisible:false, bdD:'1.2', bdN:'1', bdDS:'20', bdArea:'A',
    bdJudgement:{ok:true,reason:'No Black Dot detected.'}, remarks:''
  }));
}

    return sections.join('');
  }

  // INSPECTION SCREEN (active lot)
  if(lotState && sampleRows.length>0){

  return sections.join('');

        html += `<div class="flex items-center justify-between px-5 py-3 hover:bg-slate-800/30 transition-all flex-wrap gap-2">
          <div>
            <p class="text-xs font-bold text-white font-mono">${k.lotNumber}</p>
            <p class="text-[10px] text-slate-500 font-mono">Size: ${k.lotSize} | Sample: ${k.sampleSize} | BD Limit: ≤${k.bdMax}mm</p>
          </div>
          <div class="flex items-center gap-2 flex-wrap">
            ${statusBadge} ${resultBadge} ${fgBadge}
            ${k.status==='Open' && !isAdmin ? `<button class="startInspBtn bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-4 py-1.5 rounded-xl text-xs uppercase tracking-wider" data-idx="${kidx}">Start Inspection</button>` : ''}
            ${isAdmin ? `<button class="editLotBtn text-[10px] bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded-lg font-bold uppercase" data-idx="${kidx}">Edit</button>` : ''}
          </div>
        </div>
        <div id="editLotArea${kidx}" class="hidden px-5 pb-4"></div>`;
      });

      html += `</div></div>`;
    });
  }
  html += `</div></main>

  <footer class="bg-slate-950 border-t border-slate-900 py-5 text-center text-[10px] text-slate-600 font-mono">
    IS2500 Sampling Plan | Minor limit: 1 | Major limit: 0 | 13 samples per 90-unit lot | © 2026 Quality Assurance
  </footer>
  </div>`;
  return html;
}

// ============================================================
// INSPECTION SCREEN
// ============================================================
function buildInspectionScreen(){
  const lot = lotState;
  const {minors, majors, passed} = tallyLot();
  const filledSamples = sampleRows.filter(s=>s.serial&&!s.serialError).length;
  const allReady = filledSamples===sampleRows.length && sampleRows.every(s=>!s.serialError);

  let html = `
  <div class="min-h-screen flex flex-col">
    <header class="bg-slate-950/90 border-b border-slate-900 sticky top-0 z-40 backdrop-blur-md">
      <div class="max-w-7xl mx-auto px-4 py-3 flex flex-col sm:flex-row justify-between items-center gap-3">
        <div>
          <h1 class="text-sm font-extrabold text-white uppercase font-mono">${lot.kitName} — ${lot.lotNumber}</h1>
          <p class="text-[10px] text-slate-400 font-mono">Lot Size: ${lot.lotSize} | Sample: ${lot.sampleSize} | Model: ${lot.model} (${MODEL_CODES[lot.model]}) | Prod Month: ${mmyyDisplay(lot.prodMonthCode)} | BD Limit: ≤${lot.bdMax}mm</p>
        </div>
        <div class="flex items-center gap-3 shrink-0">
          <div class="bg-slate-900 border border-slate-800 rounded-xl px-4 py-2 text-center">
            <p class="text-[9px] text-slate-500 uppercase font-mono">Minor/Major</p>
            <p class="text-sm font-black font-mono">
              <span class="${minors<=1?'text-amber-400':'text-rose-500'}">${minors}</span>
              <span class="text-slate-500">/</span>
              <span class="${majors===0?'text-emerald-400':'text-rose-500'}">${majors}</span>
            </p>
          </div>
          <div class="bg-slate-900 border border-slate-800 rounded-xl px-4 py-2 text-center">
            <p class="text-[9px] text-slate-500 uppercase font-mono">Running Status</p>
            <p class="text-xs font-black font-mono ${passed?'text-emerald-400':'text-rose-400'}">${passed?'PASSING':'FAILING'}</p>
          </div>
          <button id="btnBackFromInsp" class="bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-2 rounded-xl text-xs font-bold uppercase">← Back</button>
        </div>
      </div>
    </header>
    <main class="flex-1 max-w-7xl w-full mx-auto p-4 space-y-4">

    <!-- SAMPLE ROWS -->
    <div class="space-y-3">`;

  sampleRows.forEach((s,i)=>{
    const res = sampleResult(s);
    const resCls = res==='PASS'?'text-emerald-400':res==='FAIL-MINOR'?'text-amber-400':'text-rose-400';
    const resLabel = res==='PASS'?'PASS':res==='FAIL-MINOR'?'FAIL (Minor)':'FAIL (Major)';

    const bdJudge = s.noBlackDot ? {ok:true,reason:'No Black Dot'} : evaluateBlackDot({visibleAt2m:s.bdVisible,D:s.bdD,N:s.bdN,DS:s.bdDS,area:s.bdArea});

    html += `
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 space-y-3 fadeIn">
      <div class="flex justify-between items-center">
        <span class="text-xs font-bold text-slate-400 font-mono uppercase tracking-widest">Sample ${i+1}</span>
        <span class="text-xs font-black font-mono ${resCls}">${resLabel}</span>
      </div>

      <!-- SERIAL -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div>
          <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1">Serial Number (15 digits)</label>
          <input type="text" data-si="${i}" data-field="serial" placeholder="${MODEL_CODES[lot.model]||'????'}${lot.prodMonthCode||'????'}xxxxxxx"
            class="sampField w-full bg-slate-950 border ${s.serialError?'border-rose-500':'border-slate-800'} rounded-xl px-3 py-2 text-sm text-white outline-none focus:border-indigo-500 font-mono"
            value="${s.serial}">
          ${s.serialError ? `<p class="text-[10px] text-rose-400 mt-1">${s.serialError}</p>` : ''}
        </div>

        <!-- INSPECTION TOGGLES -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
          ${buildToggle(i,'aestheticPass',s.aestheticPass,'Aesthetic','Minor')}
          ${buildToggle(i,'generalPass',s.generalPass,'General','Major')}
          ${buildToggle(i,'functionalPass',s.functionalPass,'Functional','Major')}
          ${buildToggle(i,'screenPass',s.screenPass,'Screen','Major')}
        </div>
      </div>

      <!-- BLACK DOT -->
      <div class="bg-slate-950 border border-slate-800 rounded-xl p-3 space-y-2">
        <div class="flex items-center gap-4 flex-wrap">
          <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Black Dot</label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" data-si="${i}" data-field="noBlackDot" class="sampToggle accent-emerald-400 w-4 h-4" ${s.noBlackDot?'checked':''}>
            <span class="text-xs text-slate-300">No Black Dot</span>
          </label>
          ${!s.noBlackDot ? `
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" data-si="${i}" data-field="bdVisible" class="sampToggle accent-indigo-400 w-4 h-4" ${s.bdVisible?'checked':''}>
            <span class="text-xs text-slate-300">Visible at 2m</span>
          </label>` : ''}
        </div>
        ${!s.noBlackDot ? `
        <div class="grid grid-cols-2 sm:grid-cols-5 gap-2 text-xs">
          <div><label class="text-[9px] text-slate-500 uppercase font-mono block mb-1">D (mm)</label>
            <input type="number" step="0.01" data-si="${i}" data-field="bdD" value="${s.bdD}" class="sampField w-full bg-slate-900 border border-slate-700 rounded-lg px-2 py-1.5 text-white text-xs outline-none focus:border-indigo-500 font-mono"></div>
          <div><label class="text-[9px] text-slate-500 uppercase font-mono block mb-1">N (spots)</label>
            <input type="number" data-si="${i}" data-field="bdN" value="${s.bdN}" class="sampField w-full bg-slate-900 border border-slate-700 rounded-lg px-2 py-1.5 text-white text-xs outline-none focus:border-indigo-500 font-mono"></div>
          <div><label class="text-[9px] text-slate-500 uppercase font-mono block mb-1">DS (mm)</label>
            <input type="number" step="0.1" data-si="${i}" data-field="bdDS" value="${s.bdDS}" class="sampField w-full bg-slate-900 border border-slate-700 rounded-lg px-2 py-1.5 text-white text-xs outline-none focus:border-indigo-500 font-mono"></div>
          <div><label class="text-[9px] text-slate-500 uppercase font-mono block mb-1">Area</label>
            <select data-si="${i}" data-field="bdArea" class="sampField w-full bg-slate-900 border border-slate-700 rounded-lg px-2 py-1.5 text-white text-xs outline-none focus:border-indigo-500 font-mono">
              <option value="A" ${s.bdArea==='A'?'selected':''}>Area A (Inner)</option>
              <option value="B" ${s.bdArea==='B'?'selected':''}>Area B (Outer)</option>
              <option value="A+B" ${s.bdArea==='A+B'?'selected':''}>Area A+B</option>
            </select></div>
          <div class="flex items-end">
            <div class="w-full bg-slate-900 border ${bdJudge.ok?'border-emerald-800':'border-rose-800'} rounded-lg px-2 py-1.5">
              <p class="text-[9px] font-mono ${bdJudge.ok?'text-emerald-400':'text-rose-400'}">${bdJudge.ok?'✓ OK':'✗ FAIL'}</p>
              <p class="text-[9px] text-slate-400 leading-tight mt-0.5">${bdJudge.reason.substring(0,50)}</p>
            </div>
          </div>
        </div>` : `<p class="text-[10px] text-emerald-400 font-mono">✓ No Black Dot — Acceptable</p>`}
      </div>

      <!-- REMARK -->
      <div>
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1">Remark</label>
        <input type="text" data-si="${i}" data-field="remarks" value="${s.remarks||''}" placeholder="Optional remark" class="sampField w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white outline-none focus:border-indigo-500">
      </div>
    </div>`;
  });

  html += `</div>

    <!-- SUBMIT -->
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 space-y-3">
      <div>
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1">General Lot Remarks</label>
        <input type="text" id="lotGeneralRemarks" placeholder="Overall lot inspection remarks..." class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-white outline-none focus:border-indigo-500">
      </div>
      <div class="flex flex-col sm:flex-row justify-between items-center gap-3">
        <div class="text-xs font-mono space-y-1">
          <p>Samples ready: <span class="text-indigo-400 font-bold">${filledSamples}/${sampleRows.length}</span></p>
          <p>Minor defects: <span class="${minors<=1?'text-amber-400 font-bold':'text-rose-400 font-bold'}">${minors} / 1 allowed</span></p>
          <p>Major defects: <span class="${majors===0?'text-emerald-400 font-bold':'text-rose-400 font-bold'}">${majors} / 0 allowed</span></p>
        </div>
        <button id="btnSubmitLot" ${allReady?'':'disabled'} class="bg-${allReady?(passed?'emerald':'rose')}-600 hover:bg-${allReady?(passed?'emerald':'rose')}-500 disabled:bg-slate-700 text-white font-bold px-8 py-3 rounded-xl text-sm uppercase tracking-wider">
          Submit Lot — ${passed?'PASS':'FAIL'}
        </button>
      </div>
    </div>

    </main>
  </div>`;
  return html;
}

function buildToggle(i, field, val, label, type){
  return `
  <div>
    <label class="text-[9px] font-bold ${type==='Minor'?'text-amber-500':'text-rose-500'} uppercase tracking-widest block mb-1">${label} <span class="text-slate-600">(${type})</span></label>
    <button class="sampToggleBtn w-full py-1.5 rounded-lg text-xs font-bold uppercase tracking-wider ${val?'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30':'bg-rose-500/20 text-rose-400 border border-rose-500/30'}"
      data-si="${i}" data-field="${field}" data-val="${val?'1':''}">
      ${val?'PASS':'FAIL'}
    </button>
  </div>`;
}

// ============================================================
// EVENT BINDING
// ============================================================
function bindEvents(){
  // SETUP
  const btnSaveUrl = document.getElementById('btnSaveUrl');
  if(btnSaveUrl) btnSaveUrl.onclick = ()=>{
    const v = document.getElementById('apiUrlInput').value.trim();
    if(!v){ toast('Enter the Apps Script URL','error'); return; }
    API_URL = v;
    localStorage.setItem('oba_api_url', v);
    render();
  };

  const btnChangeUrl = document.getElementById('btnChangeUrl');
  if(btnChangeUrl) btnChangeUrl.onclick = ()=>{ API_URL=''; localStorage.removeItem('oba_api_url'); render(); };

  // LOGIN
  const btnLogin = document.getElementById('btnLogin');
  if(btnLogin) btnLogin.onclick = async()=>{
    const u = document.getElementById('loginUser').value.trim();
    const p = document.getElementById('loginPass').value.trim();
    const errEl = document.getElementById('loginErr');
    errEl.classList.add('hidden');
    try{
      const res = await api('login',{username:u, password:p});
      if(res.ok){
        currentUser = {username:res.username, role:res.role, name:res.name};
        await refreshKits();
        render();
      } else {
        errEl.textContent = res.error||'Login failed';
        errEl.classList.remove('hidden');
      }
    }catch(e){ errEl.textContent='Network error: '+e.message; errEl.classList.remove('hidden'); }
  };

  // LOGOUT
  const btnLogout = document.getElementById('btnLogout');
  if(btnLogout) btnLogout.onclick = ()=>{ currentUser=null; lotState=null; sampleRows=[]; render(); };

  // REFRESH
  const btnRefresh = document.getElementById('btnRefresh');
  if(btnRefresh) btnRefresh.onclick = async()=>{ await refreshKits(); render(); toast('Data refreshed'); };

  // CREATE KIT
  const btnCreateKit = document.getElementById('btnCreateKit');
  if(btnCreateKit) btnCreateKit.onclick = async()=>{
    const kitName = document.getElementById('newKitName').value.trim();
    const kitQty = parseInt(document.getElementById('newKitQty').value)||0;
    const model = document.getElementById('newModel').value;
    const prodMonth = document.getElementById('newProdMonth').value;
    const msgEl = document.getElementById('createKitMsg');
    if(!kitName||!kitQty||!prodMonth){ toast('Fill all kit fields','error'); return; }
    const prodMonthCode = mmyy(prodMonth);
    const res = await api('createKit',{kitName, kitSize:kitQty, lotSize:90, sampleSize:13, bdMax:2.4, model, prodMonthCode, createdBy:currentUser.username});
    if(res.ok){
      msgEl.textContent=`Created ${res.lotsCreated} lots (Lot 1 – Lot ${res.lotsCreated}), all Open.`;
      msgEl.classList.remove('hidden');
      document.getElementById('newKitName').value='';
      document.getElementById('newKitQty').value='';
      await refreshKits(); render();
      toast(`Kit created: ${res.lotsCreated} lots`);
    } else { toast(res.error||'Error','error'); }
  };

  // ADD USER
  const btnAddUser = document.getElementById('btnAddUser');
  if(btnAddUser) btnAddUser.onclick = async()=>{
    const username = document.getElementById('newInsUser').value.trim();
    const password = document.getElementById('newInsPass').value.trim();
    const name = document.getElementById('newInsName').value.trim();
    const role = document.getElementById('newInsRole').value;
    if(!username||!password||!name){ toast('Fill all user fields','error'); return; }
    const res = await api('addUser',{username,password,name,role});
    if(res.ok){
      document.getElementById('newInsUser').value='';
      document.getElementById('newInsPass').value='';
      document.getElementById('newInsName').value='';
      const msgEl = document.getElementById('addUserMsg');
      msgEl.textContent=`User "${username}" added as ${role}.`;
      msgEl.classList.remove('hidden');
      toast(`User ${username} added`);
    } else { toast(res.error||'Error','error'); }
  };

  // DOWNLOAD CSV
  const btnCSV = document.getElementById('btnDownloadCSV');
  if(btnCSV) btnCSV.onclick = downloadCSV;

  // START INSPECTION
  document.querySelectorAll('.startInspBtn').forEach(btn=>{
    btn.onclick = ()=>{
      const idx = parseInt(btn.getAttribute('data-idx'));
      const k = allKits[idx];
      lotState = {...k, sampleSize:parseInt(k.sampleSize)||13, bdMax:parseFloat(k.bdMax)||2.4};
      sampleRows = freshSamples(lotState.sampleSize);
      render();
    };
  });

  // EDIT LOT
  document.querySelectorAll('.editLotBtn').forEach(btn=>{
    btn.onclick = ()=>{
      const idx = parseInt(btn.getAttribute('data-idx'));
      const k = allKits[idx];
      const areaId = `editLotArea${idx}`;
      const area = document.getElementById(areaId);
      if(!area.classList.contains('hidden')){ area.classList.add('hidden'); area.innerHTML=''; return; }
      area.classList.remove('hidden');
      area.innerHTML = `
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-3">
          <div><label class="text-[9px] text-slate-500 uppercase font-mono block mb-1">Lot Size</label><input id="eLS${idx}" type="number" value="${k.lotSize}" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"></div>
          <div><label class="text-[9px] text-slate-500 uppercase font-mono block mb-1">Sample Size</label><input id="eSS${idx}" type="number" value="${k.sampleSize}" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"></div>
          <div><label class="text-[9px] text-slate-500 uppercase font-mono block mb-1">BD Max (mm)</label><input id="eBD${idx}" type="number" step="0.01" value="${k.bdMax}" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"></div>
          <div><label class="text-[9px] text-slate-500 uppercase font-mono block mb-1">Status</label><select id="eST${idx}" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"><option value="Open" ${k.status==='Open'?'selected':''}>Open</option><option value="Closed" ${k.status==='Closed'?'selected':''}>Closed</option></select></div>
          <div><label class="text-[9px] text-slate-500 uppercase font-mono block mb-1">Model</label><select id="eMD${idx}" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"><option value="LH1G" ${k.model==='LH1G'?'selected':''}>LH1G (1217)</option><option value="LH3G" ${k.model==='LH3G'?'selected':''}>LH3G (1218)</option></select></div>
          <div><label class="text-[9px] text-slate-500 uppercase font-mono block mb-1">Prod Month</label><input id="ePM${idx}" type="month" value="${mmyyToInput(k.prodMonthCode)}" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"></div>
        </div>
        <button class="saveLotEditBtn bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-5 py-2 rounded-xl text-xs uppercase tracking-wider" data-idx="${idx}">Save Changes</button>`;

      area.querySelector('.saveLotEditBtn').onclick = async()=>{
        const lotSize = parseInt(document.getElementById('eLS'+idx).value);
        const sampleSize = parseInt(document.getElementById('eSS'+idx).value);
        const bdMax = parseFloat(document.getElementById('eBD'+idx).value);
        const status = document.getElementById('eST'+idx).value;
        const model = document.getElementById('eMD'+idx).value;
        const pm = document.getElementById('ePM'+idx).value;
        const prodMonthCode = pm ? mmyy(pm) : k.prodMonthCode;
        const res = await api('updateKit',{kitName:k.kitName,lotNumber:k.lotNumber,lotSize,sampleSize,bdMax,status,model,prodMonthCode});
        if(res.ok){ await refreshKits(); render(); toast('Lot updated'); }
        else { toast(res.error||'Error','error'); }
      };
    };
  });

  // BACK FROM INSPECTION
  const btnBack = document.getElementById('btnBackFromInsp');
  if(btnBack) btnBack.onclick = ()=>{ if(confirm('Go back? Unsaved data will be lost.')){ lotState=null; sampleRows=[]; render(); } };

  // INSPECTION SAMPLE FIELDS
  document.querySelectorAll('.sampField').forEach(el=>{
    el.onchange = ()=>{
      const i = parseInt(el.getAttribute('data-si'));
      const field = el.getAttribute('data-field');
      sampleRows[i][field] = el.value;
      if(field==='serial'){
        const used = sampleRows.filter((_,idx)=>idx!==i).map(s=>s.serial.toUpperCase()).filter(Boolean);
        sampleRows[i].serialError = validateSerial(el.value, lotState.model, lotState.prodMonthCode, used);
      }
      render();
    };
  });

  document.querySelectorAll('.sampToggle').forEach(el=>{
    el.onchange = ()=>{
      const i = parseInt(el.getAttribute('data-si'));
      const field = el.getAttribute('data-field');
      sampleRows[i][field] = el.checked;
      render();
    };
  });

  document.querySelectorAll('.sampToggleBtn').forEach(el=>{
    el.onclick = ()=>{
      const i = parseInt(el.getAttribute('data-si'));
      const field = el.getAttribute('data-field');
      sampleRows[i][field] = !sampleRows[i][field];
      render();
    };
  });

  // SUBMIT LOT
  const btnSubmit = document.getElementById('btnSubmitLot');
  if(btnSubmit) btnSubmit.onclick = async()=>{
    const {minors, majors, passed} = tallyLot();
    const fgPassQty = passed ? lotState.lotSize : 0;
    const lotResult = passed ? 'PASS' : 'FAIL';
    const remarks = document.getElementById('lotGeneralRemarks')?.value || '';

    const units = sampleRows.map(s=>{
      const bd = s.noBlackDot ? {ok:true,reason:'No Black Dot'} : evaluateBlackDot({visibleAt2m:s.bdVisible,D:s.bdD,N:s.bdN,DS:s.bdDS,area:s.bdArea});
      const res = sampleResult(s);
      const fails = [];
      if(!s.aestheticPass) fails.push('Aesthetic Fail (Minor)');
      if(!s.generalPass) fails.push('General Fail (Major)');
      if(!s.functionalPass) fails.push('Functional Fail (Major)');
      if(!s.screenPass) fails.push('Screen Fail (Major)');
      if(!s.noBlackDot&&!bd.ok) fails.push('Black Dot Fail (Major): '+bd.reason);
      return {
        serial:s.serial, aes:s.aestheticPass?'Pass':'Fail', general:s.generalPass?'Pass':'Fail',
        func:s.functionalPass?'Pass':'Fail', screen:s.screenPass?'Pass':'Fail',
        bdDisplay:s.noBlackDot?'No Black Dot':bd.reason,
        remark:fails.length?fails.join(', '):(s.remarks||'OK'), result:res==='PASS'?'Pass':'Fail'
      };
    });

    const res = await api('submitInspection',{
      inspector:currentUser.name, kitName:lotState.kitName, lotNumber:lotState.lotNumber,
      lotResult, kitTotalQty:lotState.kitTotalQty, totalLots:lotState.totalLots,
      model:lotState.model, prodMonthCode:lotState.prodMonthCode, fgPassQty,
      generalRemarks:remarks, units
    });
    if(res.ok){
      toast(`${lotState.lotNumber} submitted: ${lotResult} | FG Pass: ${fgPassQty}`);
      lotState=null; sampleRows=[];
      await refreshKits();
      render();
    } else { toast(res.error||'Save error','error'); }
  };
}

// ============================================================
// DATA
// ============================================================
async function refreshKits(){
  const res = await api('getKits',{});
  if(res.ok) allKits = res.kits;
}

function downloadCSV(){
  let csv = 'IS2500 OBA MASTER COMPLIANCE REPORT\n';
  csv += `Generated: ${new Date().toLocaleString()}\n\n`;
  csv += 'Lot Name,Kit Name,Model,Prod Month,Lot Size,Samples,Status,Result,Minor Count,Major Count,FG Pass Qty,Completed\n';
  const groups = groupKits(allKits);
  groups.forEach(g=>{
    g.lots.forEach(k=>{
      csv += `"${k.lotNumber}","${k.kitName}","${k.model||'-'}","${mmyyDisplay(k.prodMonthCode)}",${k.lotSize},${k.sampleSize},"${k.status}","${k.result||'Pending'}","","",${k.fgPassQty||0},""\n`;
    });
  });
  const link = document.createElement('a');
  link.href = 'data:text/csv;charset=utf-8,' + encodeURI(csv);
  link.download = `IS2500_Report_${Date.now()}.csv`;
  document.body.appendChild(link); link.click(); document.body.removeChild(link);
}

// ============================================================
// BOOT
// ============================================================
render();
</script>
</body>
</html>
