<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IS2500 OBA Inspection</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Roboto,Arial,sans-serif}
body{background:#020617;color:#e2e8f0;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#1e293b;border-radius:4px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .25s ease forwards}

/* LAYOUT */
.page{min-height:100vh;display:flex;flex-direction:column}
.hdr{background:#0a0f1e;border-bottom:1px solid #1e293b;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:40}
.hdr-left{display:flex;align-items:center;gap:12px}
.logo{display:flex;align-items:center;background:#ffffff;border-radius:8px;padding:5px 12px}.logo img{height:26px;width:auto}
.hdr-title{font-size:15px;font-weight:800;color:#fff;letter-spacing:.05em}
.hdr-sub{font-size:10px;color:#64748b;margin-top:2px;letter-spacing:.04em}
.hdr-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.main{flex:1;max-width:1400px;width:100%;margin:0 auto;padding:20px}

/* CARDS */
.card{background:#0f172a;border:1px solid #1e293b;border-radius:14px;padding:20px;margin-bottom:16px}
.card-title{font-size:11px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #1e293b}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:16px}
.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}

/* FORM */
.fg{margin-bottom:12px}
.lbl{display:block;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.field{width:100%;background:#020617;border:1px solid #1e293b;border-radius:9px;padding:9px 12px;font-size:13px;color:#e2e8f0;outline:none;transition:border-color .2s}
.field:focus{border-color:#6366f1}
.field.err-field{border-color:#ef4444}
select.field{cursor:pointer}

/* BUTTONS */
.btn{border:none;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;padding:9px 18px;letter-spacing:.04em;text-transform:uppercase;transition:all .15s}
.btn-primary{background:#4f46e5;color:#fff}.btn-primary:hover{background:#6366f1}
.btn-danger{background:#dc2626;color:#fff}.btn-danger:hover{background:#ef4444}
.btn-ghost{background:#1e293b;color:#94a3b8;border:1px solid #334155}.btn-ghost:hover{background:#334155;color:#fff}
.btn-sm{padding:5px 12px;font-size:10px}
.btn-full{width:100%;padding:11px}
.btn:disabled{background:#1e293b;color:#475569;cursor:not-allowed}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.05em}
.badge-open{background:#1e3a5f;color:#60a5fa;border:1px solid #1d4ed8}
.badge-closed{background:#1e293b;color:#64748b;border:1px solid #334155}
.badge-pass{background:#052e16;color:#4ade80;border:1px solid #166534}
.badge-fail{background:#2d0a0a;color:#f87171;border:1px solid #991b1b}

/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat{background:#0a0f1e;border:1px solid #1e293b;border-radius:12px;padding:14px 16px}
.stat-label{font-size:9px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.07em}
.stat-val{font-size:24px;font-weight:900;color:#fff;margin-top:4px;font-variant-numeric:tabular-nums}
.stat-sub{font-size:10px;color:#475569;margin-top:3px;font-family:monospace}

/* BATCH GROUP */
.batch-group{background:#0a0f1e;border:1px solid #1e293b;border-radius:14px;overflow:hidden;margin-bottom:14px}
.batch-hdr{padding:14px 18px;border-bottom:1px solid #1e293b;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px}
.batch-name{font-size:14px;font-weight:800;color:#fff;font-family:monospace;letter-spacing:.04em}
.batch-meta{font-size:10px;color:#475569;margin-top:3px;font-family:monospace;line-height:1.6}
.batch-meta b{color:#94a3b8}
.lot-row{padding:12px 18px;border-bottom:1px solid #0f172a;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;transition:background .15s}
.lot-row:last-child{border-bottom:none}
.lot-row:hover{background:#0f172a}
.lot-name{font-size:12px;font-weight:700;color:#e2e8f0;font-family:monospace}
.lot-meta{font-size:10px;color:#475569;font-family:monospace;margin-top:2px}
.lot-actions{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.progress-bar{background:#0f172a;border-radius:6px;height:5px;overflow:hidden;min-width:80px}
.progress-fill{background:#4f46e5;height:100%;transition:width .4s}

/* INSPECTION */
.insp-header{background:#0a0f1e;border:1px solid #1e293b;border-radius:14px;padding:16px 20px;margin-bottom:16px}
.insp-title{font-size:14px;font-weight:800;color:#fff;font-family:monospace}
.insp-meta{font-size:10px;color:#64748b;font-family:monospace;margin-top:4px;line-height:1.7}
.sample-card{background:#0a0f1e;border:1px solid #1e293b;border-radius:12px;padding:16px;margin-bottom:12px}
.sample-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sample-num{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.07em;font-family:monospace}
.sample-result{font-size:12px;font-weight:800;font-family:monospace}
.res-pass{color:#4ade80}.res-minor{color:#fbbf24}.res-major{color:#f87171}.res-pending{color:#475569}
.test-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px}
.toggle-btn{width:100%;padding:8px 6px;border:1px solid;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.04em;transition:all .15s}
.t-pass{background:#052e16;color:#4ade80;border-color:#166534}
.t-fail{background:#2d0a0a;color:#f87171;border-color:#991b1b}
.toggle-lbl{font-size:9px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.bd-box{background:#020617;border:1px solid #1e293b;border-radius:10px;padding:12px;margin-top:10px}
.bd-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-top:8px}
.bd-result{padding:8px 10px;border-radius:8px;font-size:10px;font-family:monospace;line-height:1.5}
.bd-ok{background:#052e16;border:1px solid #166534;color:#4ade80}
.bd-fail{background:#2d0a0a;border:1px solid #991b1b;color:#f87171}
.insp-footer{background:#0a0f1e;border:1px solid #1e293b;border-radius:12px;padding:16px;margin-top:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.insp-tally{font-size:11px;font-family:monospace;line-height:1.8;color:#64748b}
.insp-tally b{color:#e2e8f0}
.insp-tally .t-ok{color:#4ade80}.insp-tally .t-warn{color:#fbbf24}.insp-tally .t-fail{color:#f87171}

/* COMPACT SAMPLE LIST */
.samp-row{border-bottom:1px solid #0f172a;padding:8px 14px;display:flex;align-items:center;gap:10px;transition:background .15s}
.samp-row:last-child{border-bottom:none}
.samp-row:hover{background:#0f172a}
.samp-row.is-fail{background:#170808}
.samp-num-badge{width:22px;height:22px;border-radius:6px;background:#1e293b;color:#64748b;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;font-family:monospace;flex-shrink:0}
.samp-serial-wrap{width:195px;flex-shrink:0}
.samp-serial-inp{width:100%;background:#020617;border:1px solid #1e293b;border-radius:7px;padding:6px 9px;font-size:11.5px;color:#94a3b8;outline:none;font-family:'SF Mono',Consolas,monospace;letter-spacing:.02em}
.samp-serial-inp:focus{border-color:#6366f1;color:#e2e8f0}
.samp-serial-inp.err-field{border-color:#ef4444}
.samp-toggles{display:flex;gap:4px;align-items:center;flex-shrink:0}
.mini-toggle{padding:5px 9px;border-radius:6px;border:1px solid;font-size:9px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:.02em;min-width:34px;text-align:center;transition:all .12s;line-height:1}
.mini-toggle-pass{background:#0c2818;color:#4ade80;border-color:#1c4a32}
.mini-toggle-fail{background:#2d0a0a;color:#f87171;border-color:#5c1414}
.samp-bd-toggle{padding:5px 9px;border-radius:6px;border:1px solid #283449;background:#141d2e;color:#7c8aa3;font-size:9px;font-weight:800;cursor:pointer;white-space:nowrap;letter-spacing:.02em;line-height:1;flex-shrink:0}
.samp-bd-toggle.bd-active-ok{background:#0c2818;color:#4ade80;border-color:#1c4a32}
.samp-bd-toggle.bd-active-fail{background:#2d0a0a;color:#f87171;border-color:#5c1414}
.samp-spacer{flex:1}
.samp-result-tag{font-size:9px;font-weight:800;font-family:monospace;padding:5px 10px;border-radius:6px;white-space:nowrap;width:88px;text-align:center;letter-spacing:.02em;flex-shrink:0}
.samp-expand{width:100%;background:#020617;border:1px solid #1e293b;border-radius:10px;padding:12px;margin-top:6px}
.samp-remark-inp{width:100%;background:#020617;border:1px solid #1e293b;border-radius:7px;padding:6px 10px;font-size:11px;color:#e2e8f0;outline:none;margin-top:8px}
.samp-remark-inp:focus{border-color:#6366f1}

/* TOAST */
.toast{position:fixed;top:16px;right:16px;z-index:9999;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:700;color:#fff;animation:fadeIn .3s ease;pointer-events:none}
.toast-ok{background:#166534}.toast-err{background:#991b1b}

/* UTIL */
.hidden{display:none!important}
.text-muted{color:#64748b;font-size:11px}
.text-pass{color:#4ade80}.text-fail{color:#f87171}.text-warn{color:#fbbf24}
.mono{font-family:monospace}
.err{color:#f87171;font-size:10px;margin-top:4px}
.info-banner{background:#0d1f3c;border:1px solid #1d4ed8;border-radius:10px;padding:12px 16px;font-size:11px;color:#93c5fd;line-height:1.7;margin-bottom:16px}
footer.pg-footer{padding:16px;text-align:center;font-size:10px;color:#1e293b;font-family:monospace;border-top:1px solid #0f172a;margin-top:20px}

@media print{
  .hdr-right,.btn{display:none!important}
  body{background:#fff!important;color:#000!important}
  .stat,.batch-group,.summ-table{break-inside:avoid}
  #summaryScreen{display:block!important}
  #app{display:none!important}
}
</style>
</head>
<body>
<div id="toast"></div>
<div id="app"></div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let API = localStorage.getItem('oba_api')||'';
let user = null;          // {username,role,name}
let batches = [];         // all batch/lot rows from backend
let activeLot = null;     // lot object being inspected
let samples = [];         // array of sample state objects
let expandedSample = null; // index of sample with expanded BD/remark panel open
let toastTimer = null;

const MODEL_CODE = {LH1G:'1217',LH3G:'1218'};
const LOT_SIZE   = 90;
const SAMPLE_N   = 13;

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function mmyy(s){ if(!s)return''; const[y,m]=s.split('-'); return m+y.slice(2); }
function mmyyDisp(c){ if(!c||c.length!==4)return'-'; return c.slice(0,2)+'/20'+c.slice(2); }
function mmyyInp(c){ if(!c||c.length!==4)return''; return'20'+c.slice(2)+'-'+c.slice(0,2); }

// ═══════════════════════════════════════════════════════════
// DRAFT AUTO-SAVE (so in-progress inspections survive refresh/close)
// ═══════════════════════════════════════════════════════════
function draftKey(lot){
  return 'oba_draft_'+(user?user.username:'anon')+'_'+lot.batchName+'_'+lot.lotNumber;
}
function saveDraft(){
  if(!activeLot) return;
  // Stamp each sample with its completion time if not already stamped
  samples.forEach(s=>{
    if(!s.inspectedAt && sampleResult(s)!=='PENDING'){
      s.inspectedAt = new Date().toISOString();
    }
  });
  try{
    localStorage.setItem(draftKey(activeLot), JSON.stringify({
      lot:activeLot, samples:samples,
      lotRemarks:document.getElementById('lotRemarks')?.value||'',
      savedAt:new Date().toISOString()
    }));
  }catch(e){ /* storage full or blocked - ignore */ }
}
function loadDraft(lot){
  try{
    const raw=localStorage.getItem(draftKey(lot));
    if(!raw) return null;
    return JSON.parse(raw);
  }catch(e){ return null; }
}
function clearDraft(lot){
  try{ localStorage.removeItem(draftKey(lot)); }catch(e){}
}
function listDraftsForUser(){
  const out=[];
  const prefix='oba_draft_'+(user?user.username:'anon')+'_';
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k && k.startsWith(prefix)){
      try{
        const d=JSON.parse(localStorage.getItem(k));
        out.push({key:k, ...d});
      }catch(e){}
    }
  }
  return out;
}

function toast(msg,type='ok'){
  clearTimeout(toastTimer);
  const el=document.getElementById('toast');
  el.className=`toast toast-${type}`;
  el.textContent=msg;
  el.style.display='block';
  toastTimer=setTimeout(()=>{ el.style.display='none'; },3500);
}

async function api(action,data={}){
  data.action=action;
  const r=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(data)});
  return r.json();
}

async function loadBatches(){
  let r=await api('getBatches');
  if(!r.ok && (r.error||'').toLowerCase().includes('unknown')){
    r=await api('getKits');
    if(r.ok && r.kits){
      // normalize kits to batch format
      r.batches=r.kits.map(k=>({
        batchName:k.kitName||k.batchName||'',
        lotNumber:k.lotNumber||'',
        lotSize:Number(k.lotSize)||90,
        sampleSize:Number(k.sampleSize)||13,
        bdMax:Number(k.bdMax)||2.4,
        status:k.status||'Open',
        createdBy:k.createdBy||'',
        createdAt:k.createdAt||'',
        result:k.result||'',
        batchQty:Number(k.kitTotalQty)||Number(k.batchQty)||0,
        totalLots:Number(k.totalLots)||0,
        model:k.model||'',
        prodMonthCode:k.prodMonthCode||'',
        fgPassQty:Number(k.fgPassQty)||0
      }));
    }
  }
  if(r.ok) batches=r.batches||[];
}

// ═══════════════════════════════════════════════════════════
// GROUPING
// ═══════════════════════════════════════════════════════════
function groupBatches(){
  const map={},order=[];
  batches.forEach(b=>{
    if(!map[b.batchName]){map[b.batchName]=[];order.push(b.batchName);}
    map[b.batchName].push(b);
  });
  return order.map(name=>{
    const lots=map[name];
    lots.sort((a,b)=>{
      const na=parseInt(String(a.lotNumber).replace(/\D+/g,''))||0;
      const nb=parseInt(String(b.lotNumber).replace(/\D+/g,''))||0;
      return na-nb;
    });
    const batchQty   = Number(lots[0].batchQty)||0;
    const totalLots  = Number(lots[0].totalLots)||lots.length;
    const completed  = lots.filter(l=>l.status==='Closed').length;
    const pending    = lots.filter(l=>l.status==='Open').length;
    const passLots   = lots.filter(l=>l.result==='PASS').length;
    const failLots   = lots.filter(l=>l.result==='FAIL').length;
    const fgTotal    = lots.reduce((s,l)=>s+Number(l.fgPassQty||0),0);
    return{name,lots,batchQty,totalLots,completed,pending,passLots,failLots,fgTotal,
           model:lots[0].model||'',prodMonthCode:lots[0].prodMonthCode||''};
  });
}

// ═══════════════════════════════════════════════════════════
// SERIAL VALIDATION
// ═══════════════════════════════════════════════════════════
function validateSerial(serial,model,prodMonthCode,batchUsed){
  const s=(serial||'').trim().toUpperCase();
  if(!/^\d{15}$/.test(s)) return 'Must be exactly 15 digits';
  const exp=MODEL_CODE[model]||'';
  if(exp && s.substring(0,4)!==exp) return `Model prefix must be ${exp} for ${model}`;
  // Normalize prodMonthCode to 4 digits (restore lost leading zero, e.g. "626" -> "0626")
  let pmc=String(prodMonthCode||'').trim();
  if(pmc.length===3) pmc='0'+pmc;
  if(pmc && s.substring(4,8)!==pmc) return `Month code must be ${pmc} (${mmyyDisp(pmc)})`;
  const mm=parseInt(s.substring(4,6));
  if(isNaN(mm)||mm<1||mm>12) return 'Month digits invalid (01-12)';
  if(!/^\d{7}$/.test(s.substring(8))) return 'Last 7 chars must be numeric';
  if((batchUsed||[]).includes(s)) return 'Duplicate serial in this batch';
  return '';
}

// ═══════════════════════════════════════════════════════════
// BLACK DOT LOGIC (per IS2500 standard)
// ═══════════════════════════════════════════════════════════
function evalBD(s){
  if(s.bdNoDot) return {ok:true,reason:'No Black Dot — Acceptable'};
  if(!s.bdVisible) return {ok:true,reason:'Not visible at 2m — Acceptable (any quantity)'};
  const D=parseFloat(s.bdD)||0, N=parseInt(s.bdN)||0, DS=parseFloat(s.bdDS)||0;
  if(D>2.4) return {ok:false,reason:`D=${D}mm > 2.4mm — FAIL (Major)`};
  if(N>3)   return {ok:false,reason:`N=${N} > 3 — FAIL`};
  if(DS<15) return {ok:false,reason:`DS=${DS}mm < 15mm — FAIL`};
  if(D<=1.28) return {ok:true,reason:`D=${D}mm ≤ 1.28mm, N=${N}, DS=${DS}mm — OK`};
  // 1.28 < D <= 2.4: area rules
  const area=s.bdArea||'A';
  if(area==='A'){ if(N<=1) return {ok:true,reason:`D=${D}mm in Area A, N=${N}≤1 — OK`}; return {ok:false,reason:`Area A: N=${N}>1 — FAIL`}; }
  if(area==='B'){ if(N<=3) return {ok:true,reason:`D=${D}mm in Area B, N=${N}≤3 — OK`}; return {ok:false,reason:`Area B: N=${N}>3 — FAIL`}; }
  if(N<=3) return {ok:true,reason:`D=${D}mm in Area A+B, N=${N}≤3 — OK`};
  return {ok:false,reason:`Area A+B: N=${N}>3 — FAIL`};
}

// ═══════════════════════════════════════════════════════════
// SAMPLE RESULT
// ═══════════════════════════════════════════════════════════
function sampleResult(s){
  if(!s.serial||s.serialError) return 'PENDING';
  const bd=evalBD(s);
  const major=!s.generalPass||!s.funcPass||!s.screenPass||!bd.ok;
  const minor=!s.aestheticPass;
  if(major) return 'FAIL-MAJOR';
  if(minor) return 'FAIL-MINOR';
  return 'PASS';
}

function freshSamples(n){
  return Array.from({length:n},(_,i)=>({
    num:i+1,serial:'',serialError:'',
    aestheticPass:true,generalPass:true,funcPass:true,screenPass:true,
    bdNoDot:true,bdVisible:false,bdD:'',bdN:'',bdDS:'',bdArea:'A',
    remark:''
  }));
}

function tallyLot(){
  let minor=0,major=0;
  samples.forEach(s=>{
    const r=sampleResult(s);
    if(r==='FAIL-MINOR') minor++;
    if(r==='FAIL-MAJOR') major++;
  });
  return{minor,major,passed:minor<=1&&major===0,filled:samples.filter(s=>sampleResult(s)!=='PENDING').length};
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function render(){ document.getElementById('app').innerHTML=buildPage(); bindEvents(); }

function buildPage(){
  if(!API)          return buildSetup();
  if(!user)         return buildLogin();
  if(activeLot)     return buildInspection();
  return buildDashboard();
}

// ─── SETUP ────────────────────────────────────────────────
function buildSetup(){
  return `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px">

        <button class="mini-toggle ${s.generalPass?'mini-toggle-pass':'mini-toggle-fail'} sToggle" data-i="${i}" data-f="generalPass" title="General (Major)">Gen</button>
        <button class="mini-toggle ${s.funcPass?'mini-toggle-pass':'mini-toggle-fail'} sToggle" data-i="${i}" data-f="funcPass" title="Functional (Major)">Func</button>
        <button class="mini-toggle ${s.screenPass?'mini-toggle-pass':'mini-toggle-fail'} sToggle" data-i="${i}" data-f="screenPass" title="Screen (Major)">Scr</button>
        <button class="samp-bd-toggle ${bdBtnCls} bdExpandBtn" data-i="${i}" title="Black Dot">${bdBtnLabel}</button>
      </div>

      <div class="samp-spacer"></div>

      <span class="samp-result-tag" style="${rBg}">${rLbl}</span>

      ${isExpanded?`
      <div class="samp-expand">
        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:8px">
          <span class="lbl" style="margin-bottom:0">Black Dot Detail</span>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px">
            <input type="checkbox" class="sBDNoDot" data-i="${i}" ${s.bdNoDot?'checked':''}> No Black Dot
          </label>
          ${!s.bdNoDot?`<label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px">
            <input type="checkbox" class="sBDVis" data-i="${i}" ${s.bdVisible?'checked':''}> Visible at 2m
          </label>`:''}
        </div>
        ${!s.bdNoDot?`
        <div class="bd-grid">
          <div><label class="lbl">D (mm)</label><input class="field mono sBDF" data-i="${i}" data-f="bdD" type="number" step="0.01" value="${s.bdD}" placeholder="e.g. 1.2"></div>
          <div><label class="lbl">N (spots)</label><input class="field mono sBDF" data-i="${i}" data-f="bdN" type="number" value="${s.bdN}" placeholder="e.g. 2"></div>
          <div><label class="lbl">DS (mm)</label><input class="field mono sBDF" data-i="${i}" data-f="bdDS" type="number" step="0.1" value="${s.bdDS}" placeholder="e.g. 20"></div>
          <div><label class="lbl">Area</label>
            <select class="field mono sBDF" data-i="${i}" data-f="bdArea">
              <option value="A" ${s.bdArea==='A'?'selected':''}>Area A</option>
              <option value="B" ${s.bdArea==='B'?'selected':''}>Area B</option>
              <option value="A+B" ${s.bdArea==='A+B'?'selected':''}>Area A+B</option>
            </select></div>
          <div style="display:flex;align-items:flex-end">
            <div class="bd-result ${bd.ok?'bd-ok':'bd-fail'}">${bd.ok?'✓ OK':'✗ FAIL'}<br>${bd.reason}</div>
          </div>
        </div>`:`<div class="text-pass" style="font-size:11px;font-family:monospace">✓ No Black Dot — Acceptable</div>`}
        <input class="samp-remark-inp sRemark" data-i="${i}" type="text" value="${s.remark||''}" placeholder="Optional remark or defect description">
      </div>`:''}
    </div>`;
  });

  html+=`</div>`;

  html+=`<div class="insp-footer">
    <div class="insp-tally">
      <div>Samples filled: <b class="${filled===samples.length?'t-ok':'t-warn'}">${filled}/${samples.length}</b></div>
      <div>Aesthetic (Minor): <b class="${minor<=1?'t-ok':'t-fail'}">${minor} / 1 allowed</b></div>
      <div>Major defects: <b class="${major===0?'t-ok':'t-fail'}">${major} / 0 allowed</b></div>
      <div>Lot verdict: <b class="${passed?'t-ok':'t-fail'}">${passed?'✓ PASS':'✗ FAIL'}</b></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
      <input id="lotRemarks" class="field" type="text" style="width:260px" placeholder="General lot remarks (optional)">
      <button id="btnSubmitLot" class="btn ${allReady?(passed?'btn-primary':'btn-danger'):''}" ${allReady?'':'disabled'} style="min-width:200px">
        ${allReady?(passed?'✓ Submit Lot — PASS':'⚠ Submit Lot — FAIL'):`Fill all ${samples.length} serials to submit`}
      </button>
    </div>
  </div>

  </div>
  <footer class="pg-footer">IS2500 OBA Inspection | © 2026</footer>
  </div>`;
  return html;
}

// ═══════════════════════════════════════════════════════════
// EVENT BINDING
// ═══════════════════════════════════════════════════════════
function bindEvents(){
  // Setup
  const bs=document.getElementById('btnSetup');
  if(bs) bs.onclick=()=>{ const v=document.getElementById('apiInput').value.trim(); if(!v){toast('Enter URL','err');return;} API=v; localStorage.setItem('oba_api',v); render(); };

  // Login
  const bl=document.getElementById('btnLogin');
  if(bl) bl.onclick=async()=>{
    const u=document.getElementById('lUser').value.trim();
    const p=document.getElementById('lPass').value.trim();
    const err=document.getElementById('lErr');
    err.classList.add('hidden');
    try{
      const r=await api('login',{username:u,password:p});
      if(r.ok){ user={username:r.username,role:r.role,name:r.name}; await loadBatches(); render(); }
      else{ err.textContent=r.error||'Login failed'; err.classList.remove('hidden'); }
    }catch(e){ err.textContent='Network error: '+e.message; err.classList.remove('hidden'); }
  };
  const lp=document.getElementById('lPass');
  if(lp) lp.onkeydown=e=>{ if(e.key==='Enter') document.getElementById('btnLogin')?.click(); };

  const bcu=document.getElementById('btnChgUrl');
  if(bcu) bcu.onclick=()=>{ API=''; localStorage.removeItem('oba_api'); render(); };

  // Logout
  const blo=document.getElementById('btnLogout');
  if(blo) blo.onclick=()=>{ user=null; batches=[]; activeLot=null; samples=[]; expandedSample=null; render(); };

  // Refresh
  const br=document.getElementById('btnRefresh');
  if(br) br.onclick=async()=>{ await loadBatches(); render(); toast('Refreshed'); };

  // Create Batch
  const bcb=document.getElementById('btnCreateBatch');
  if(bcb) bcb.onclick=async()=>{
    const batchName=document.getElementById('bName').value.trim();
    const batchQty=parseInt(document.getElementById('bQty').value)||0;
    const model=document.getElementById('bModel').value;
    const month=document.getElementById('bMonth').value;
    const msgEl=document.getElementById('createMsg');
    if(!batchName){ toast('Enter Batch Name','err'); return; }
    if(batchQty<1){ toast('Enter Batch Quantity > 0','err'); return; }
    const prodMonthCode=month?mmyy(month):'';
    msgEl.textContent='Creating lots…'; msgEl.classList.remove('hidden');
    try{
      // Try new API first, fall back to old if script not yet updated
      let r=await api('createBatch',{batchName,batchQty,model,prodMonthCode,createdBy:user.username});
      if(!r.ok && (r.error||'').toLowerCase().includes('unknown')){
        // Old script fallback: createKit
        r=await api('createKit',{kitName:batchName,kitSize:batchQty,lotSize:90,sampleSize:13,bdMax:2.4,model,prodMonthCode,createdBy:user.username});
        if(r.ok) r.batchQty=batchQty;
      }
      if(r.ok){
        const lots=r.lotsCreated;
        const rem=batchQty%90;
        msgEl.innerHTML=`✓ <b>${batchName}</b>: <b>${lots} lots</b> created.<br>
          Batch Qty: <b>${batchQty}</b> | Each lot: 90 units | Sample: 13${rem>0?`<br>Last lot: ${rem} units (still 13 samples)`:''}`;
        msgEl.classList.remove('hidden');
        document.getElementById('bName').value='';
        document.getElementById('bQty').value='';
        await loadBatches(); render();
        toast(`✓ ${lots} lots created for ${batchName}`);
      } else {
        msgEl.textContent='Error: '+(r.error||'unknown');
        toast(r.error||'Error','err');
      }
    }catch(e){ msgEl.textContent='Network error: '+e.message; toast('Network error','err'); }
  };

  // Add User
  const bau=document.getElementById('btnAddUser');
  if(bau) bau.onclick=async()=>{
    const username=document.getElementById('uUser').value.trim();
    const password=document.getElementById('uPass').value.trim();
    const name=document.getElementById('uName').value.trim();
    const role=document.getElementById('uRole').value;
    if(!username||!password||!name){ toast('Fill all user fields','err'); return; }
    const r=await api('addUser',{username,password,name,role});
    if(r.ok){ toast(`User ${username} added`); document.getElementById('addUserMsg').textContent=`✓ ${username} added as ${role}`; document.getElementById('addUserMsg').classList.remove('hidden'); document.getElementById('uUser').value=''; document.getElementById('uPass').value=''; document.getElementById('uName').value=''; }
    else toast(r.error||'Error','err');
  };

  // Delete Batch
  document.querySelectorAll('.delBatchBtn').forEach(btn=>{
    btn.onclick=async()=>{
      const name=btn.getAttribute('data-name');
      if(!confirm(`Delete ALL lots in batch "${name}"? Cannot be undone.`)) return;
      const r=await api('deleteBatch',{batchName:name});
      if(r.ok){ await loadBatches(); render(); toast(`Batch "${name}" deleted`); }
      else toast(r.error||'Error','err');
    };
  });

  // Delete Lot
  document.querySelectorAll('.delLotBtn').forEach(btn=>{
    btn.onclick=async()=>{
      const ri=parseInt(btn.getAttribute('data-ri'));
      const lot=batches[ri];
      if(!confirm(`Delete lot "${lot.lotNumber}"?`)) return;
      const r=await api('deleteLot',{batchName:lot.batchName,lotNumber:lot.lotNumber});
      if(r.ok){ await loadBatches(); render(); toast('Lot deleted'); }
      else toast(r.error||'Error','err');
    };
  });

  // Edit Lot
  document.querySelectorAll('.editBtn').forEach(btn=>{
    btn.onclick=()=>{
      const ri=parseInt(btn.getAttribute('data-ri'));
      const lot=batches[ri];
      const area=document.getElementById('editArea'+ri);
      if(!area.classList.contains('hidden')){ area.classList.add('hidden'); area.innerHTML=''; return; }
      area.classList.remove('hidden');
      area.innerHTML=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:10px">
        <div><label class="lbl">Status</label><select id="eS${ri}" class="field"><option value="Open" ${lot.status==='Open'?'selected':''}>Open</option><option value="Closed" ${lot.status==='Closed'?'selected':''}>Closed</option></select></div>
        <div><label class="lbl">BD Max (mm)</label><input id="eBD${ri}" class="field" type="number" step="0.01" value="${lot.bdMax}"></div>
        <div><label class="lbl">Model</label><select id="eMD${ri}" class="field"><option value="LH1G" ${lot.model==='LH1G'?'selected':''}>LH1G</option><option value="LH3G" ${lot.model==='LH3G'?'selected':''}>LH3G</option></select></div>
        <div><label class="lbl">Prod Month</label><input id="ePM${ri}" class="field" type="month" value="${mmyyInp(lot.prodMonthCode)}"></div>
      </div>
      <button class="btn btn-primary btn-sm saveLotEdit" data-ri="${ri}">Save Changes</button>`;
      area.querySelector('.saveLotEdit').onclick=async()=>{
        const status=document.getElementById('eS'+ri).value;
        const bdMax=parseFloat(document.getElementById('eBD'+ri).value)||2.4;
        const model=document.getElementById('eMD'+ri).value;
        const pm=document.getElementById('ePM'+ri).value;
        const prodMonthCode=pm?mmyy(pm):lot.prodMonthCode;
        const r=await api('updateLot',{batchName:lot.batchName,lotNumber:lot.lotNumber,status,bdMax,model,prodMonthCode});
        if(r.ok){ await loadBatches(); render(); toast('Lot updated'); }
        else toast(r.error||'Error','err');
      };
    };
  });

  // Start Inspection
  document.querySelectorAll('.startBtn').forEach(btn=>{
    btn.onclick=()=>{
      const ri=parseInt(btn.getAttribute('data-ri'));
      const lot=batches[ri];
      const draft=loadDraft(lot);
      if(draft && draft.samples && draft.samples.length){
        const filled=draft.samples.filter(s=>s.serial).length;
        if(confirm(`A saved draft exists for ${lot.lotNumber} (${filled}/${draft.samples.length} samples filled, saved ${new Date(draft.savedAt).toLocaleString()}).\n\nResume this draft? (Cancel = start fresh)`)){
          activeLot=lot; expandedSample=null;
          samples=draft.samples;
          render();
          setTimeout(()=>{ const r=document.getElementById('lotRemarks'); if(r) r.value=draft.lotRemarks||''; },50);
          return;
        } else {
          clearDraft(lot);
        }
      }
      activeLot=lot; expandedSample=null;
      samples=freshSamples(activeLot.sampleSize||SAMPLE_N);
      render();
    };
  });

  // CSV
  const bcsv=document.getElementById('btnCSV');
  if(bcsv) bcsv.onclick=downloadCSV;
  const bsum=document.getElementById('btnSummary');
  if(bsum) bsum.onclick=async()=>{ await loadBatches(); showSummary(); };
  const bclose=document.getElementById('btnCloseSummary');
  if(bclose) bclose.onclick=()=>{
    document.getElementById('summaryScreen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
  };

  // Back from inspection - auto-saves draft, does not lose data
  const back=document.getElementById('btnBackInsp');
  if(back) back.onclick=()=>{
    saveDraft();
    toast('Draft saved — resume anytime from this lot');
    activeLot=null; samples=[]; expandedSample=null; render();
  };

  // Sample serial input
  document.querySelectorAll('.sSerial').forEach(el=>{
    el.onchange=async()=>{
      const i=parseInt(el.getAttribute('data-i'));
      samples[i].serial=el.value.trim().toUpperCase();
      const used=samples.filter((_,j)=>j!==i&&samples[j].serial).map(s=>s.serial.toUpperCase());
      let err=validateSerial(samples[i].serial,activeLot.model,activeLot.prodMonthCode,used);
      if(!err && samples[i].serial){
        try{
          const dup=await api('checkSerial',{serial:samples[i].serial});
          if(dup.ok && dup.exists) err='Duplicate — already exists in master data ('+(dup.batch||'')+' '+(dup.lot||'')+')';
        }catch(e){ /* ignore network errors on dup check */ }
      }
      samples[i].serialError=err;
      saveDraft();
      render();
    };
  });

  // Sample toggles (pass/fail buttons)
  document.querySelectorAll('.sToggle').forEach(btn=>{
    btn.onclick=()=>{
      const i=parseInt(btn.getAttribute('data-i'));
      const f=btn.getAttribute('data-f');
      samples[i][f]=!samples[i][f];
      saveDraft();
      render();
    };
  });

  // Black Dot expand/collapse toggle
  document.querySelectorAll('.bdExpandBtn').forEach(btn=>{
    btn.onclick=()=>{
      const i=parseInt(btn.getAttribute('data-i'));
      expandedSample = (expandedSample===i) ? null : i;
      render();
    };
  });

  // BD no dot checkbox
  document.querySelectorAll('.sBDNoDot').forEach(el=>{
    el.onchange=()=>{ const i=parseInt(el.getAttribute('data-i')); samples[i].bdNoDot=el.checked; saveDraft(); render(); };
  });

  // BD visible checkbox
  document.querySelectorAll('.sBDVis').forEach(el=>{
    el.onchange=()=>{ const i=parseInt(el.getAttribute('data-i')); samples[i].bdVisible=el.checked; saveDraft(); render(); };
  });

  // BD fields
  document.querySelectorAll('.sBDF').forEach(el=>{
    el.onchange=()=>{ const i=parseInt(el.getAttribute('data-i')); const f=el.getAttribute('data-f'); samples[i][f]=el.value; saveDraft(); render(); };
  });

  // Remark
  document.querySelectorAll('.sRemark').forEach(el=>{
    el.onchange=()=>{ const i=parseInt(el.getAttribute('data-i')); samples[i].remark=el.value; saveDraft(); };
  });

  // Lot-level remarks field also triggers save
  const lotRemarksEl=document.getElementById('lotRemarks');
  if(lotRemarksEl) lotRemarksEl.onchange=()=>{ saveDraft(); };

  // Submit Lot
  const bsub=document.getElementById('btnSubmitLot');
  if(bsub) bsub.onclick=async()=>{
    const {minor,major,passed}=tallyLot();
    const lotResult=passed?'PASS':'FAIL';
    const fgPassQty=passed?Number(activeLot.lotSize):0;
    const lotRemarks=document.getElementById('lotRemarks')?.value||'';

    const units=samples.map(s=>{
      const bd=evalBD(s);
      const r=sampleResult(s);
      const fails=[];
      if(!s.aestheticPass) fails.push('Aesthetic Fail (Minor)');
      if(!s.generalPass)   fails.push('General Fail (Major)');
      if(!s.funcPass)      fails.push('Functional Fail (Major)');
      if(!s.screenPass)    fails.push('Screen Fail (Major)');
      if(!bd.ok)           fails.push('Black Dot Fail (Major): '+bd.reason);
      return{
        serial:s.serial,
        aes:s.aestheticPass?'Pass':'Fail',
        general:s.generalPass?'Pass':'Fail',
        func:s.funcPass?'Pass':'Fail',
        screen:s.screenPass?'Pass':'Fail',
        bd:s.bdNoDot?'No BD':(s.bdVisible?bd.reason:'Not visible @2m'),
        remark:fails.length?fails.join(' | '):(s.remark||lotRemarks||'OK'),
        sampleResult:r==='PASS'?'Pass':'Fail',
        inspectedAt: s.inspectedAt || new Date().toISOString()
      };
    });

    const r=await api('submitLot',{
      inspector:user.name,
      batchName:activeLot.batchName,
      lotNumber:activeLot.lotNumber,
      lotResult,fgPassQty,
      batchQty:activeLot.batchQty,
      totalLots:activeLot.totalLots,
      model:activeLot.model,
      prodMonthCode:activeLot.prodMonthCode,
      units
    });

    if(r.ok){
      clearDraft(activeLot);
      toast(`${activeLot.lotNumber}: ${lotResult} | FG Pass: ${fgPassQty}`);
      activeLot=null; samples=[]; expandedSample=null;
      await loadBatches(); render();
    } else { saveDraft(); toast(r.error||'Save failed — draft kept locally','err'); }
  };
}

// ═══════════════════════════════════════════════════════════
// CSV
// ═══════════════════════════════════════════════════════════
function downloadCSV(){
  const groups=groupBatches();
  let csv='IS2500 OBA Batch Inspection Report\n';
  csv+=`Generated: ${new Date().toLocaleString()}\n\n`;
  csv+='BatchName,LotNumber,Model,ProdMonth,BatchQty,LotSize,SampleSize,Status,Result,FGPassQty\n';
  groups.forEach(g=>{
    g.lots.forEach(l=>{
      csv+=`"${l.batchName}","${l.lotNumber}","${l.model||'-'}","${mmyyDisp(l.prodMonthCode)}",${l.batchQty},${l.lotSize},${l.sampleSize},"${l.status}","${l.result||'Pending'}",${l.fgPassQty||0}\n`;
    });
  });
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=`OBA_Report_${Date.now()}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

// ═══════════════════════════════════════════════════════════
// SUMMARY VIEW
// ═══════════════════════════════════════════════════════════
function showSummary(){
  const groups=groupBatches();
  const totalLots=batches.length;
  const doneLots=batches.filter(b=>b.status==='Closed').length;
  const passLots=batches.filter(b=>b.result==='PASS').length;
  const failLots=batches.filter(b=>b.result==='FAIL').length;
  const pendLots=batches.filter(b=>b.status==='Open').length;
  const fgAll=batches.reduce((s,b)=>s+Number(b.fgPassQty||0),0);
  const totalBatchQty=groups.reduce((s,g)=>s+(g.batchQty||0),0);

  let html=`
  <!-- TOTAL SUMMARY -->
  <div style="margin-bottom:24px">
    <div style="font-size:13px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px">Total Summary</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px">
      <div class="stat"><div class="stat-label">Total Batches</div><div class="stat-val">${groups.length}</div></div>
      <div class="stat"><div class="stat-label">Total Lots</div><div class="stat-val">${totalLots}</div></div>
      <div class="stat"><div class="stat-label">Lots Completed</div><div class="stat-val">${doneLots}<span style="font-size:12px;color:#475569"> / ${totalLots}</span></div></div>
      <div class="stat"><div class="stat-label">Lots Passed</div><div class="stat-val text-pass">${passLots}</div></div>
      <div class="stat"><div class="stat-label">Lots Failed</div><div class="stat-val" style="color:${failLots>0?'#f87171':'#475569'}">${failLots}</div></div>
      <div class="stat"><div class="stat-label">Pending Lots</div><div class="stat-val" style="color:#fbbf24">${pendLots}</div></div>
      <div class="stat"><div class="stat-label">FG Released</div><div class="stat-val text-pass">${fgAll}</div><div class="stat-sub">of ${totalBatchQty} units</div></div>
      <div class="stat"><div class="stat-label">Yield Rate</div><div class="stat-val" style="color:#60a5fa">${doneLots>0?((passLots/doneLots)*100).toFixed(1):0}%</div></div>
    </div>
  </div>`;

  // PER BATCH SUMMARY
  groups.forEach(g=>{
    const pct=g.totalLots>0?Math.round(g.completed/g.totalLots*100):0;
    const fgPct=g.batchQty>0?Math.round(g.fgTotal/g.batchQty*100):0;
    html+=`
    <div class="batch-group" style="margin-bottom:20px">
      <div style="padding:14px 18px;border-bottom:1px solid #1e293b">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
          <div>
            <div style="font-size:14px;font-weight:800;color:#fff;font-family:monospace">${g.name}</div>
            <div style="font-size:10px;color:#64748b;font-family:monospace;margin-top:3px">
              Model: <b style="color:#94a3b8">${g.model||'-'}</b> &nbsp;|&nbsp;
              Prod Month: <b style="color:#94a3b8">${mmyyDisp(g.prodMonthCode)}${g.prodMonthCode2?' / '+mmyyDisp(g.prodMonthCode2):''}</b> &nbsp;|&nbsp;
              Batch Qty: <b style="color:#94a3b8">${g.batchQty}</b> &nbsp;|&nbsp;
              Total Lots: <b style="color:#94a3b8">${g.totalLots}</b>
            </div>
          </div>
          <div style="display:flex;gap:16px;flex-wrap:wrap">
            <div style="text-align:center"><div style="font-size:9px;color:#475569;text-transform:uppercase">Completed</div><div style="font-size:18px;font-weight:900;color:#fff">${g.completed}/${g.totalLots}</div></div>
            <div style="text-align:center"><div style="font-size:9px;color:#475569;text-transform:uppercase">Pass</div><div style="font-size:18px;font-weight:900;color:#4ade80">${g.passLots}</div></div>
            <div style="text-align:center"><div style="font-size:9px;color:#475569;text-transform:uppercase">Fail</div><div style="font-size:18px;font-weight:900;color:${g.failLots>0?'#f87171':'#475569'}">${g.failLots}</div></div>
            <div style="text-align:center"><div style="font-size:9px;color:#475569;text-transform:uppercase">FG Released</div><div style="font-size:18px;font-weight:900;color:#4ade80">${g.fgTotal}</div></div>
            <div style="text-align:center"><div style="font-size:9px;color:#475569;text-transform:uppercase">Pending</div><div style="font-size:18px;font-weight:900;color:#fbbf24">${g.pending}</div></div>
          </div>
        </div>
        <div style="margin-top:10px;display:flex;gap:16px;flex-wrap:wrap">
          <div style="flex:1;min-width:160px">
            <div style="font-size:9px;color:#475569;margin-bottom:3px">Lot Progress (${pct}%)</div>
            <div style="background:#0f172a;border-radius:4px;height:6px;overflow:hidden"><div style="background:#6366f1;height:100%;width:${pct}%"></div></div>
          </div>
          <div style="flex:1;min-width:160px">
            <div style="font-size:9px;color:#475569;margin-bottom:3px">FG Release (${fgPct}%)</div>
            <div style="background:#0f172a;border-radius:4px;height:6px;overflow:hidden"><div style="background:#4ade80;height:100%;width:${fgPct}%"></div></div>
          </div>
        </div>
      </div>

      <!-- LOT WISE TABLE -->
      <div style="overflow-x:auto">
        <table class="summ-table" style="width:100%;border-collapse:collapse;font-size:11px;font-family:monospace">
          <thead>
            <tr style="background:#060c18;color:#334155;font-size:9px;text-transform:uppercase;letter-spacing:.06em">
              <th style="padding:8px 14px;text-align:left;border-bottom:1px solid #1e293b">#</th>
              <th style="padding:8px 14px;text-align:left;border-bottom:1px solid #1e293b">Lot Number</th>
              <th style="padding:8px 10px;text-align:center;border-bottom:1px solid #1e293b">Lot Size</th>
              <th style="padding:8px 10px;text-align:center;border-bottom:1px solid #1e293b">Sample</th>
              <th style="padding:8px 10px;text-align:center;border-bottom:1px solid #1e293b">Status</th>
              <th style="padding:8px 10px;text-align:center;border-bottom:1px solid #1e293b">Result</th>
              <th style="padding:8px 10px;text-align:center;border-bottom:1px solid #1e293b">FG Qty</th>
            </tr>
          </thead>
          <tbody>
    `;
    g.lots.forEach((lot,idx)=>{
      const resBg=lot.result==='PASS'?'background:#052e16;color:#4ade80':lot.result==='FAIL'?'background:#2d0a0a;color:#f87171':'background:#1e293b;color:#64748b';
      const stBg=lot.status==='Open'?'background:#1e3a5f;color:#60a5fa':'background:#1e293b;color:#64748b';
      html+=`<tr style="border-bottom:1px solid #0a0f1e;${idx%2===0?'':'background:#0a0f1e'}">
        <td style="padding:8px 14px;color:#334155">${idx+1}</td>
        <td style="padding:8px 14px;color:#e2e8f0;font-weight:700">${lot.lotNumber}</td>
        <td style="padding:8px 10px;text-align:center;color:#94a3b8">${lot.lotSize}</td>
        <td style="padding:8px 10px;text-align:center;color:#94a3b8">${lot.sampleSize}</td>
        <td style="padding:8px 10px;text-align:center"><span style="font-size:9px;font-weight:700;padding:3px 8px;border-radius:4px;${stBg}">${lot.status}</span></td>
        <td style="padding:8px 10px;text-align:center">${lot.result?`<span style="font-size:9px;font-weight:700;padding:3px 8px;border-radius:4px;${resBg}">${lot.result}</span>`:'<span style="color:#334155">—</span>'}</td>
        <td style="padding:8px 10px;text-align:center;font-weight:700;color:${lot.fgPassQty>0?'#4ade80':'#334155'}">${lot.fgPassQty>0?lot.fgPassQty:'—'}</td>
      </tr>`;
    });
    html+=`<tr style="background:#060c18;font-weight:800">
      <td colspan="6" style="padding:8px 14px;color:#94a3b8;text-align:right">Batch Total FG Released:</td>
      <td style="padding:8px 10px;text-align:center;color:#4ade80;font-weight:900">${g.fgTotal}</td>
    </tr>`;
    html+=`</tbody></table></div></div>`;
  });

  document.getElementById('summaryContent').innerHTML=html;
  // Copy logo src
  const mainLogo=document.querySelector('.logo img');
  const summLogo=document.getElementById('summLogoImg');
  if(mainLogo && summLogo) summLogo.src=mainLogo.src;

  document.getElementById('app').classList.add('hidden');
  document.getElementById('summaryScreen').classList.remove('hidden');
}

window.addEventListener('beforeunload', ()=>{
  if(activeLot && samples.length) saveDraft();
});

render();
</script>

<!-- SUMMARY SCREEN -->
<div id="summaryScreen" class="hidden" style="min-height:100vh;background:#020617">
  <header class="hdr">
    <div class="hdr-left">
      <div class="logo"><img src="" alt="Lumio" id="summLogoImg"></div>
      <div><div class="hdr-title">OBA INSPECTION — SUMMARY REPORT</div>
        <div class="hdr-sub">IS 2500 | LEVEL G2 | LOT SIZE 90 | SAMPLE 13</div>
      </div>
    </div>
    <div class="hdr-right">
      <button id="btnCloseSummary" class="btn btn-ghost btn-sm">← Back</button>
      <button id="btnPrint" class="btn btn-primary btn-sm" onclick="window.print()">🖨 Print</button>
    </div>
  </header>
  <div style="max-width:1200px;margin:0 auto;padding:24px" id="summaryContent"></div>
</div>
</body>
</html>
